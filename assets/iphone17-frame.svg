<?xml version="1.0" encoding="UTF-8"?>
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 300 632">
  <defs>
    <!-- Natural Titanium body gradient -->
    <linearGradient id="tg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%"   stop-color="#D4D0C8"/>
      <stop offset="30%"  stop-color="#BFBBB2"/>
      <stop offset="60%"  stop-color="#96928A"/>
      <stop offset="100%" stop-color="#6A6660"/>
    </linearGradient>
    <!-- Button gradient -->
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%"   stop-color="#C2BEB6"/>
      <stop offset="100%" stop-color="#8A8680"/>
    </linearGradient>
    <!-- Left button gradient (slightly different angle) -->
    <linearGradient id="lg" x1="100%" y1="0%" x2="0%" y2="100%">
      <stop offset="0%"   stop-color="#C8C4BC"/>
      <stop offset="100%" stop-color="#888480"/>
    </linearGradient>
    <!-- Subtle sheen overlay on body -->
    <linearGradient id="sheen" x1="0%" y1="0%" x2="30%" y2="100%">
      <stop offset="0%"   stop-color="rgba(255,255,255,0.12)"/>
      <stop offset="50%"  stop-color="rgba(255,255,255,0.00)"/>
      <stop offset="100%" stop-color="rgba(0,0,0,0.08)"/>
    </linearGradient>
  </defs>

  <!-- ── Main frame body (evenodd = outer minus screen = titanium ring) ── -->
  <path fill-rule="evenodd"
    d="M52 0 H248 Q300 0 300 52 V580 Q300 632 248 632 H52 Q0 632 0 580 V52 Q0 0 52 0 Z
       M56 14 H244 Q286 14 286 56 V576 Q286 618 244 618 H56 Q14 618 14 576 V56 Q14 14 56 14 Z"
    fill="url(#tg)"/>

  <!-- Sheen overlay on frame -->
  <path fill-rule="evenodd"
    d="M52 0 H248 Q300 0 300 52 V580 Q300 632 248 632 H52 Q0 632 0 580 V52 Q0 0 52 0 Z
       M56 14 H244 Q286 14 286 56 V576 Q286 618 244 618 H56 Q14 618 14 576 V56 Q14 14 56 14 Z"
    fill="url(#sheen)"/>

  <!-- Top polished edge highlight -->
  <path d="M54 0.8 H246 Q299.2 0.8 299.2 54"
        fill="none" stroke="rgba(255,255,255,0.40)" stroke-width="1.2"/>

  <!-- Screen inner rim (glass edge glow) -->
  <rect x="14.8" y="14.8" width="270.4" height="602.4" rx="41.2"
        fill="none" stroke="rgba(255,255,255,0.11)" stroke-width="1.5"/>

  <!-- ── Dynamic Island (pill cutout) ── -->
  <rect x="97" y="20" width="106" height="36" rx="18" fill="#080808"/>
  <!-- DI subtle inner highlight -->
  <rect x="97.5" y="20.5" width="105" height="35" rx="17.5"
        fill="none" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
  <!-- DI camera dot -->
  <circle cx="185" cy="38" r="5.5" fill="#111"/>
  <circle cx="185" cy="38" r="3" fill="#0D0D0D"/>

  <!-- ── Left side buttons ── -->
  <!-- Action button (top) -->
  <rect x="0.5" y="108" width="5.5" height="30" rx="2.8" fill="url(#lg)"/>
  <rect x="0.5" y="108" width="5.5" height="30" rx="2.8" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <!-- Volume up -->
  <rect x="0.5" y="150" width="5.5" height="40" rx="2.8" fill="url(#lg)"/>
  <rect x="0.5" y="150" width="5.5" height="40" rx="2.8" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>
  <!-- Volume down -->
  <rect x="0.5" y="202" width="5.5" height="40" rx="2.8" fill="url(#lg)"/>
  <rect x="0.5" y="202" width="5.5" height="40" rx="2.8" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- ── Right side button (power) ── -->
  <rect x="294" y="166" width="5.5" height="68" rx="2.8" fill="url(#bg)"/>
  <rect x="294" y="166" width="5.5" height="68" rx="2.8" fill="none"
        stroke="rgba(255,255,255,0.18)" stroke-width="0.8"/>

  <!-- ── USB-C port (bottom center) ── -->
  <rect x="118" y="625" width="64" height="7" rx="3.5" fill="#1A1816"/>
  <rect x="121" y="627" width="58" height="3" rx="1.5" fill="#0C0B0A"/>
  <!-- Port pin holes -->
  <circle cx="131" cy="628.5" r="1" fill="#222"/>
  <circle cx="150" cy="628.5" r="1" fill="#222"/>
  <circle cx="169" cy="628.5" r="1" fill="#222"/>

  <!-- ── Bottom highlight arc ── -->
  <path d="M54 631.2 H246 Q299.2 631.2 299.2 578"
        fill="none" stroke="rgba(0,0,0,0.25)" stroke-width="1"/>
</svg>
